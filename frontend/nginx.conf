server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the configured backend service.
    # The backend host is rendered into this file at container startup,
    # which avoids nginx runtime DNS resolution issues for variable upstreams.
    location /api/ {
        proxy_pass http://${BACKEND_HOST}:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback – serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
