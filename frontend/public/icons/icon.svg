<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="ballGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Blue bottom band -->
  <rect x="0" y="358" width="512" height="154" fill="#1e3a8a" clip-path="url(#roundClip)"/>

  <!-- Football (centered at 256,210, rotated -18°) -->
  <g transform="translate(256,210) rotate(-18)">
    <!-- Shadow -->
    <path d="M -178,0 C -148,-96 -72,-128 0,-128 C 72,-128 148,-96 178,0 C 148,96 72,128 0,128 C -72,128 -148,96 -178,0 Z"
          fill="black" opacity="0.35" transform="translate(5,6)"/>
    <!-- Ball body -->
    <path d="M -178,0 C -148,-96 -72,-128 0,-128 C 72,-128 148,-96 178,0 C 148,96 72,128 0,128 C -72,128 -148,96 -178,0 Z"
          fill="url(#ballGrad)"/>
    <!-- Highlight -->
    <path d="M -130,-52 C -105,-88 -58,-105 0,-105 C 42,-105 80,-92 110,-68"
          stroke="rgba(255,255,255,0.28)" stroke-width="22" fill="none" stroke-linecap="round"/>
    <!-- Center stitch line -->
    <line x1="0" y1="-104" x2="0" y2="104" stroke="white" stroke-width="6" opacity="0.9"/>
    <!-- Laces -->
    <line x1="-30" y1="-60" x2="30" y2="-60" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <line x1="-36" y1="-36" x2="36" y2="-36" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <line x1="-36" y1="-12" x2="36" y2="-12" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <line x1="-36" y1="12"  x2="36" y2="12"  stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <line x1="-36" y1="36"  x2="36" y2="36"  stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <line x1="-30" y1="60"  x2="30" y2="60"  stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- App name text -->
  <text x="256" y="416" text-anchor="middle"
        font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
        font-size="50" font-weight="900" fill="white" letter-spacing="5">MADDEN</text>
  <text x="256" y="474" text-anchor="middle"
        font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
        font-size="46" font-weight="900" fill="#93c5fd" letter-spacing="4">RECORDS</text>
</svg>
