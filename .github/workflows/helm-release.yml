name: Release Helm Chart

on:
  push:
    branches: [main]
    paths:
      - 'helm/**'
  workflow_dispatch:

jobs:
  release:
    name: Package & Publish Helm Chart
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          mkdir -p .helm-packages
          helm package helm/madden-records --destination .helm-packages

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy packages and update index
        run: |
          mkdir -p gh-pages/charts
          cp .helm-packages/*.tgz gh-pages/charts/
          helm repo index gh-pages/charts \
            --url https://frobobbo.github.io/madden-records/charts

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Release Helm chart $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
