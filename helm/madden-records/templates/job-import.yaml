apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "madden-records.fullname" . }}-import
  labels:
    {{- include "madden-records.labels" . | nindent 4 }}
    app.kubernetes.io/component: import-job
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "madden-records.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: import-job
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER"; do
                echo "Waiting for PostgreSQL..."; sleep 2
              done
          env:
            - name: DB_HOST
              value: {{ include "madden-records.dbHost" . | quote }}
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: {{ include "madden-records.dbUser" . | quote }}
      containers:
        - name: import
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command: ["node", "scripts/import.js"]
          env:
            - name: DB_HOST
              value: {{ include "madden-records.dbHost" . | quote }}
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: {{ include "madden-records.dbName" . | quote }}
            - name: DB_USER
              value: {{ include "madden-records.dbUser" . | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "madden-records.fullname" . }}-db
                  key: password
          volumeMounts:
            - name: import-data
              mountPath: /import
              readOnly: true
      volumes:
        - name: import-data
          configMap:
            name: {{ include "madden-records.fullname" . }}-import
            optional: true
